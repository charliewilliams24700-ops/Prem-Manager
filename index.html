<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem Manager 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #1a1a2e; color: white; }
       .screen { display: none; padding: 15px; max-width: 900px; margin: 0 auto; }
       .active { display: block; }

        /* Menu */
        #menu { text-align: center; padding-top: 80px; }
        h1 { font-size: 2.5rem; color: #00d4ff; margin-bottom: 10px; }
       .btn {
            background: #00d4ff; color: #1a1a2e; border: none;
            padding: 12px 30px; font-size: 1.1rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; margin: 5px;
        }
       .btn:hover { background: #00b8e6; }
       .btn-small { padding: 8px 15px; font-size: 0.9rem; }
       .btn-red { background: #e94560; color: white; }

        /* Team Select */
       .teams-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px; margin-top: 15px;
        }
       .team-btn {
            background: #16213e; border: 2px solid #0f3460;
            padding: 12px; border-radius: 8px; cursor: pointer; text-align: center;
        }
       .team-btn:hover { border-color: #00d4ff; }

        /* Dashboard */
       .dash-header {
            background: #16213e; padding: 15px; border-radius: 8px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
       .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
       .stat-box { background: #0f3460; padding: 12px; border-radius: 8px; text-align: center; }
       .nav-btns { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Squad Screen */
       .squad-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
       .player-list,.lineup { background: #16213e; padding: 15px; border-radius: 8px; }
       .player {
            background: #0f3460; margin: 5px 0; padding: 10px; border-radius: 6px;
            display: flex; justify-content: space-between; cursor: pointer;
        }
       .player:hover { background: #1a2b4a; }
       .player.selected { border: 2px solid #00d4ff; }
       .pos-tag {
            background: #e94560; padding: 2px 6px; border-radius: 4px;
            font-size: 0.7rem; font-weight: bold; margin-left: 5px;
        }
       .pos-GK { background: #f9a825; }.pos-DEF { background: #43a047; }
       .pos-MID { background: #1e88e5; }.pos-FWD { background: #e53935; }
        select { background: #0f3460; color: white; border: none; padding: 8px; border-radius: 6px; margin-bottom: 10px; }

        @media (max-width: 700px) {
           .squad-container { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="menu" class="screen active">
        <h1>PREM MANAGER 26</h1>
        <p style="color:#aaa; margin-bottom:30px;">2025-26 Season</p>
        <button class="btn" onclick="showScreen('teamSelect')">START GAME</button>
    </div>

    <!-- TEAM SELECT -->
    <div id="teamSelect" class="screen">
        <h2>Select Your Team</h2>
        <div class="teams-grid" id="teamsGrid"></div>
        <button class="btn btn-red btn-small" onclick="showScreen('menu')">Back</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="screen">
        <div class="dash-header">
            <div>
                <h2 id="managerTeam">Team</h2>
                <p>Manager: Charlie</p>
            </div>
            <div style="text-align:right;">
                <p>Week: 1</p>
                <p id="formationText">Formation: 4-4-2</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box"><h3>Points</h3><p style="font-size:1.8rem;">0</p></div>
            <div class="stat-box"><h3>Position</h3><p style="font-size:1.8rem;">-</p></div>
            <div class="stat-box"><h3>Budget</h3><p style="font-size:1.8rem;">£50m</p></div>
        </div>

        <div class="nav-btns">
            <button class="btn" onclick="showScreen('squad')">Squad / Lineup</button>
            <button class="btn" onclick="alert('Match engine next!')">Play Match</button>
            <button class="btn btn-red btn-small" onclick="showScreen('teamSelect')">Change Team</button>
        </div>
    </div>

    <!-- SQUAD SCREEN -->
    <div id="squad" class="screen">
        <h2>Squad Management</h2>
        <select id="formationSelect" onchange="updateFormation()">
            <option value="4-4-2">4-4-2</option>
            <option value="4-3-3">4-3-3</option>
            <option value="3-5-2">3-5-2</option>
            <option value="4-2-3-1">4-2-3-1</option>
        </select>

        <div class="squad-container">
            <div class="player-list">
                <h3>Full Squad</h3>
                <div id="fullSquad"></div>
            </div>
            <div class="lineup">
                <h3>Starting XI <span id="xiCount">(0/11)</span></h3>
                <div id="startingXI"></div>
            </div>
        </div>
        <button class="btn btn-small" onclick="showScreen('dashboard')" style="margin-top:15px;">Back to Dashboard</button>
    </div>

    <script>
        const teams = [
            "Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton", "Burnley",
            "Chelsea", "Crystal Palace", "Everton", "Fulham", "Leeds United", "Liverpool",
            "Manchester City", "Manchester United", "Newcastle United", "Nottingham Forest",
            "Sunderland", "Tottenham Hotspur", "West Ham United", "Wolves"
        ];

        // Basic squads - name, pos, rating
        const squads = {
            "Manchester United": [
                {name:"Onana", pos:"GK", rating:82}, {name:"Bayindir", pos:"GK", rating:75},
                {name:"Dalot", pos:"DEF", rating:80}, {name:"Varane", pos:"DEF", rating:84},
                {name:"Martinez", pos:"DEF", rating:83}, {name:"Shaw", pos:"DEF", rating:82},
                {name:"Wan-Bissaka", pos:"DEF", rating:79}, {name:"Lindelof", pos:"DEF", rating:78},
                {name:"Casemiro", pos:"MID", rating:84}, {name:"Fernandes", pos:"MID", rating:87},
                {name:"Mount", pos:"MID", rating:81}, {name:"Mainoo", pos:"MID", rating:77},
                {name:"Eriksen", pos:"MID", rating:80}, {name:"McTominay", pos:"MID", rating:78},
                {name:"Rashford", pos:"FWD", rating:83}, {name:"Hojlund", pos:"FWD", rating:79},
                {name:"Garnacho", pos:"FWD", rating:78}, {name:"Antony", pos:"FWD", rating:79}
            ],
            // Add other teams later - for now everyone else gets generic squad
        };

        let playerTeam = null;
        let currentSquad = [];
        let startingXI = [];
        let formation = "4-4-2";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Build team select
        const grid = document.getElementById('teamsGrid');
        teams.forEach(team => {
            const btn = document.createElement('div');
            btn.className = 'team-btn';
            btn.textContent = team;
            btn.onclick = () => selectTeam(team);
            grid.appendChild(btn);
        });

        function selectTeam(team) {
            playerTeam = team;
            document.getElementById('managerTeam').textContent = team;
            // Load squad - use Man United squad or generic if not added yet
            currentSquad = squads[team] || generateGenericSquad();
            startingXI = [];
            renderSquad();
            showScreen('dashboard');
        }

        function generateGenericSquad() {
            let squad = [];
            squad.push({name:"GK 1", pos:"GK", rating:75});
            for(let i=2; i<=7; i++) squad.push({name:`DEF ${i-1}`, pos:"DEF", rating:70+Math.floor(Math.random()*10)});
            for(let i=8; i<=13; i++) squad.push({name:`MID ${i-7}`, pos:"MID", rating:70+Math.floor(Math.random()*10)});
            for(let i=14; i<=18; i++) squad.push({name:`FWD ${i-13}`, pos:"FWD", rating:70+Math.floor(Math.random()*10)});
            return squad;
        }

        function renderSquad() {
            const fullDiv = document.getElementById('fullSquad');
            const xiDiv = document.getElementById('startingXI');
            fullDiv.innerHTML = '';
            xiDiv.innerHTML = '';

            currentSquad.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'player';
                if(startingXI.includes(i)) div.classList.add('selected');
                div.innerHTML = `${p.name} <span>${p.rating} <span class="pos-tag pos-${p.pos}">${p.pos}</span></span>`;
                div.onclick = () => togglePlayer(i);
                fullDiv.appendChild(div);
            });

            startingXI.forEach(i => {
                const p = currentSquad[i];
                const div = document.createElement('div');
                div.className = 'player';
                div.innerHTML = `${p.name} <span>${p.rating} <span class="pos-tag pos-${p.pos}">${p.pos}</span></span>`;
                div.onclick = () => togglePlayer(i);
                xiDiv.appendChild(div);
            });

            document.getElementById('xiCount').textContent = `(${startingXI.length}/11)`;
        }

        function togglePlayer(index) {
            if(startingXI.includes(index)) {
                startingXI = startingXI.filter(i => i!== index);
            } else {
                if(startingXI.length < 11) startingXI.push(index);
            }
            renderSquad();
        }

        function updateFormation() {
            formation = document.getElementById('formationSelect').value;
            document.getElementById('formationText').textContent = `Formation: ${formation}`;
        }
    </script>
</body>
</html>
