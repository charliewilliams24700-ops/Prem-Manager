<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem Manager 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #1a1a2e; color: white; }
        
        .screen { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .active { display: block; }
        
        /* Main Menu */
        #menu { text-align: center; padding-top: 100px; }
        h1 { font-size: 3rem; color: #00d4ff; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 40px; }
        .btn { 
            background: #00d4ff; color: #1a1a2e; border: none; 
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: #00b8e6; transform: scale(1.05); }
        
        /* Team Select */
        .teams-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 10px; margin-top: 20px;
        }
        .team-btn { 
            background: #16213e; border: 2px solid #0f3460; 
            padding: 15px; border-radius: 8px; cursor: pointer;
            transition: 0.2s;
        }
        .team-btn:hover { border-color: #00d4ff; background: #0f3460; }
        
        /* Dashboard */
        .dash-header { 
            background: #16213e; padding: 20px; border-radius: 8px; 
            margin-bottom: 20px; display: flex; justify-content: space-between;
        }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: #0f3460; padding: 15px; border-radius: 8px; text-align: center; }
        .back-btn { background: #e94560; margin-top: 20px; }
    </style>
</head>
<body>
    <!-- MAIN MENU SCREEN -->
    <div id="menu" class="screen active">
        <h1>PREM MANAGER 26</h1>
        <p class="subtitle">2025-26 Season | Take charge of your club</p>
        <button class="btn" onclick="showScreen('teamSelect')">START GAME</button>
    </div>

    <!-- TEAM SELECT SCREEN -->
    <div id="teamSelect" class="screen">
        <h2>Select Your Team</h2>
        <div class="teams-grid" id="teamsGrid"></div>
        <button class="btn back-btn" onclick="showScreen('menu')">Back to Menu</button>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard" class="screen">
        <div class="dash-header">
            <div>
                <h2 id="managerTeam">Team Name</h2>
                <p>Manager: Charlie</p>
            </div>
            <div>
                <p>Season: 2025-26</p>
                <p>Week: 1</p>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Points</h3>
                <p id="points" style="font-size: 2rem;">0</p>
            </div>
            <div class="stat-box">
                <h3>Position</h3>
                <p id="position" style="font-size: 2rem;">-</p>
            </div>
            <div class="stat-box">
                <h3>Budget</h3>
                <p id="budget" style="font-size: 2rem;">£50m</p>
            </div>
        </div>
        
        <button class="btn" onclick="alert('Match engine coming next!')" style="margin-top:20px;">Play Next Match</button>
        <button class="btn back-btn" onclick="showScreen('teamSelect')">Change Team</button>
    </div>

    <script>
        // 2025-26 Premier League teams
        const teams = [
            "Arsenal", "Aston Villa", "Bournemouth", "Brentford",
            "Brighton", "Burnley", "Chelsea", "Crystal Palace",
            "Everton", "Fulham", "Leeds United", "Liverpool",
            "Manchester City", "Manchester United", "Newcastle United",
            "Nottingham Forest", "Sunderland", "Tottenham Hotspur",
            "West Ham United", "Wolves"
        ];
        
        let playerTeam = null;
        
        // Show/hide screens
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        // Populate team buttons
        const grid = document.getElementById('teamsGrid');
        teams.forEach(team => {
            const btn = document.createElement('div');
            btn.className = 'team-btn';
            btn.textContent = team;
            btn.onclick = () => selectTeam(team);
            grid.appendChild(btn);
        });
        
        // Select team and go to dashboard
        function selectTeam(team) {
            playerTeam = team;
            document.getElementById('managerTeam').textContent = team;
            showScreen('dashboard');
        }
    </script>
</body>
</html>
