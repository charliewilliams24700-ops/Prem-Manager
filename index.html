<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem Manager 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); 
            color: #fff; 
            min-height: 100vh;
        }
.screen { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Menu */
        #menu { text-align: center; padding-top: 100px; }
        h1 { 
            font-size: 3rem; 
            background: linear-gradient(90deg, #00d4ff, #00ff88); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px; 
            font-weight: 800;
        }
.btn { 
            background: linear-gradient(135deg, #00d4ff, #00a8cc); 
            color: #0f0c29; 
            border: none; 
            padding: 14px 32px; 
            font-size: 1.05rem; 
            font-weight: 700; 
            border-radius: 12px; 
            cursor: pointer; 
            margin: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5); }
.btn:active { transform: translateY(0); }
.btn-small { padding: 10px 18px; font-size: 0.9rem; }
.btn-red { 
            background: linear-gradient(135deg, #ff4757, #e84118); 
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }
.btn-red:hover { box-shadow: 0 6px 20px rgba(255, 71, 87, 0.5); }

        /* Glass Cards */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
        }

        /* Team Select */
.teams-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-top: 20px; 
        }
.team-btn { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px; 
            border-radius: 14px; 
            cursor: pointer; 
            text-align: center;
            transition: all 0.2s ease;
            font-weight: 600;
        }
.team-btn:hover { 
            background: rgba(0, 212, 255, 0.15); 
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-3px);
        }

        /* Dashboard */
.dash-header { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-box { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px; 
            border-radius: 14px; 
            text-align: center; 
        }
.stat-box h3 { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
.stat-box p { font-size: 2rem; font-weight: 700; color: #00d4ff; }
.nav-btns { display: flex; gap: 10px; flex-wrap: wrap; }

        /* Squad + Pitch */
.squad-container { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
.player-list,.pitch-container { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 18px; 
            border-radius: 16px; 
            max-height: 70vh; 
            overflow-y: auto; 
        }
.player-list::-webkit-scrollbar, .pitch-container::-webkit-scrollbar { width: 6px; }
.player-list::-webkit-scrollbar-thumb, .pitch-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
.player { 
            background: rgba(255, 255, 255, 0.05); 
            margin: 6px 0; 
            padding: 10px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            cursor: pointer; 
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
.player:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(4px); }
.player.selected { 
            border-color: #00d4ff; 
            background: rgba(0, 212, 255, 0.15);
        }
.pos-tag { 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            margin-left: 6px; 
        }
.pos-GK { background: #f39c12; }.pos-DEF { background: #27ae60; }
.pos-MID { background: #3498db; }.pos-FWD { background: #e74c3c; }

        /* PITCH */
.pitch { 
            background: linear-gradient(180deg, #1e5631 0%, #2d7a46 100%); 
            border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 12px; 
            height: 420px; 
            position: relative; 
            margin-bottom: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
.center-circle { 
            width: 90px; 
            height: 90px; 
            border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 50%; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%,-50%); 
        }
.pitch-player { 
            position: absolute; 
            background: linear-gradient(135deg, #00d4ff, #00a8cc); 
            color: #0f0c29; 
            padding: 6px 10px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            transform: translate(-50%,-50%); 
            text-align: center; 
            min-width: 65px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
.pitch-player:hover { transform: translate(-50%,-50%) scale(1.1); }
.subs-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.sub-player { 
            background: rgba(255, 255, 255, 0.08); 
            padding: 6px 10px; 
            border-radius: 8px; 
            font-size: 0.75rem; 
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
.sub-player:hover { background: rgba(255, 255, 255, 0.15); }

        /* MODAL */
.modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(8px);
            z-index: 999; 
            justify-content: center; 
            align-items: center; 
            pointer-events: none; 
        }
.modal.active { display: flex; pointer-events: all; }
.modal-content { 
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            width: 90%; 
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
.modal input { 
            width: 100%; 
            padding: 14px; 
            margin: 18px 0; 
            border-radius: 12px; 
            border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05); 
            color: white; 
            font-size: 1rem; 
            text-align: center;
            transition: all 0.2s ease;
        }
.modal input:focus { 
            outline: none; 
            border-color: #00d4ff;
            background: rgba(255,255,255,0.08);
        }

select { 
            background: rgba(255, 255, 255, 0.08); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 12px;
            font-weight: 600;
        }

@media (max-width: 850px) {
   .squad-container { grid-template-columns: 1fr; }
   .pitch { height: 360px; }
   h1 { font-size: 2.2rem; }
}
    </style>
</head>

        </div>
        <div class="stats">

            </div>
